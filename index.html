<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Financly.ai – Domain For Sale</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
        color: #f8fafc;
        padding: 2rem;
      }

      .card {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 1.5rem;
        padding: 3rem 3.5rem;
        max-width: 520px;
        width: 100%;
        text-align: center;
        backdrop-filter: blur(12px);
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
      }

      .badge {
        display: inline-block;
        background: rgba(99, 102, 241, 0.2);
        border: 1px solid rgba(99, 102, 241, 0.4);
        color: #a5b4fc;
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        padding: 0.35rem 1rem;
        border-radius: 9999px;
        margin-bottom: 1.75rem;
      }

      .domain {
        font-size: clamp(2rem, 8vw, 3rem);
        font-weight: 800;
        letter-spacing: -0.02em;
        background: linear-gradient(90deg, #818cf8, #6ee7b7);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 1rem;
      }

      .tagline {
        font-size: 1.05rem;
        color: #94a3b8;
        line-height: 1.6;
        margin-bottom: 2.25rem;
      }

      .divider {
        width: 3rem;
        height: 3px;
        background: linear-gradient(90deg, #6366f1, #10b981);
        border-radius: 9999px;
        margin: 0 auto 2.25rem;
      }

      .cta-label {
        font-size: 0.8rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #64748b;
        margin-bottom: 0.75rem;
      }

      .email-link {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: linear-gradient(135deg, #6366f1, #4f46e5);
        color: #fff;
        font-size: 1rem;
        font-weight: 600;
        text-decoration: none;
        padding: 0.85rem 2rem;
        border-radius: 0.75rem;
        transition: opacity 0.2s, transform 0.2s;
        box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
      }

      .email-link:hover {
        opacity: 0.9;
        transform: translateY(-1px);
      }

      .footer-note {
        margin-top: 2rem;
        font-size: 0.8rem;
        color: #475569;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="badge">🏷️ Domain For Sale</div>
      <div class="domain">Financly.ai</div>
      <p class="tagline">
        This premium domain is available for purchase.
        Own a short, memorable brand name in the fast-growing AI &amp; fintech space.
      </p>
      <div class="divider"></div>
      <p class="cta-label">Make an offer</p>
      <a class="email-link" href="mailto:hello@financly.ai">
        ✉ hello@financly.ai
      </a>
      <p class="footer-note">Serious enquiries only. Price negotiable.</p>
    </div>
  </body>
</html>
